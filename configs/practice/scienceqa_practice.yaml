# @package _global_
defaults:
  - /eval/vqa/scienceqa_practice_eval@evaluation
  - _self_

exp_id: "scienceqa_practice"

practice:
  epochs: 3
  batch_size: 32
  grpo_n: 5
  rollout_concurrency: 16
  rollout_temperature: 0.7
  task_timeout: 3600
  do_eval: false
  agent_objective: |
    input: image tokens + a VQA question (multiple choice)
    output: the option letter directly (e.g., A, B, C, D)
  learning_objective: |
    Help the VQA agent improve answer correctness and exact target-string alignment on science questions with images.
  num_experiences_per_query: 1

data:
  practice_dataset_name: "ScienceQA_train"
